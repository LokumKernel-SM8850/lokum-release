name: LokumKernel auto build/release

on:
  workflow_dispatch:
    inputs:
      executor:
        description: Where the lane build runs
        type: choice
        required: true
        default: proxmox-ct
        options:
          - proxmox-ct
          - local
      lanes:
        description: "changed, all, or comma-separated manifest/release ids"
        required: true
        default: changed
      force_build:
        description: Build selected lanes even when tracked upstream heads have not changed
        type: boolean
        required: true
        default: false
      update_ksun:
        description: Try to replay the Lokum KernelSU/SUSFS integration on latest KernelSU Next dev
        type: boolean
        required: true
        default: true
      update_susfs:
        description: Try to re-apply the SUSFS GKI patch from latest susfs4ksu branch
        type: boolean
        required: true
        default: true
      publish_release:
        description: Create a GitHub pre-release and upload artifacts
        type: boolean
        required: true
        default: true
      cleanup_after_run:
        description: Remove generated output and reset CI-mutated repos after each lane
        type: boolean
        required: true
        default: true
      cleanup_caches:
        description: Also remove downloaded tool/cache files and Bazel cache after the lane
        type: boolean
        required: true
        default: false
      release_suffix:
        description: Optional suffix for generated release ids; leave empty for timestamp
        required: false
        default: ""
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: write
  actions: read

defaults:
  run:
    shell: bash

concurrency:
  group: lokum-auto-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  discover:
    name: Discover release lanes
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.discover_lanes.outputs.matrix }}
      has_lanes: ${{ steps.discover_lanes.outputs.has_lanes }}
      count: ${{ steps.discover_lanes.outputs.count }}
    steps:
      - name: Checkout release tooling
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Discover lanes from manifests
        id: discover_lanes
        env:
          LANES: ${{ inputs.lanes || 'changed' }}
          FORCE_BUILD: ${{ inputs.force_build }}
          UPDATE_KSUNEXT: ${{ inputs.update_ksun }}
          UPDATE_SUSFS: ${{ inputs.update_susfs }}
        run: scripts/ci/list-release-lanes.sh

      - name: Summary
        run: |
          {
            echo "## LokumKernel lane discovery"
            echo ""
            echo "Selected lanes: ${{ steps.discover_lanes.outputs.count }}"
            echo '```json'
            echo '${{ steps.discover_lanes.outputs.matrix }}'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  auto-release:
    name: Build and publish ${{ matrix.release_id }}
    needs: discover
    if: ${{ needs.discover.outputs.has_lanes == 'true' }}
    runs-on: [self-hosted, linux, x64, lokum-sm8850]
    timeout-minutes: 240
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    env:
      LOKUM_EXECUTOR: ${{ inputs.executor || 'proxmox-ct' }}
    steps:
      - name: Checkout release tooling
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Show selected lane
        run: |
          echo "Executor: $LOKUM_EXECUTOR"
          echo "Manifest: ${{ matrix.manifest }}"
          echo "Source branch: ${{ matrix.source_branch }}"
          echo "Release id: ${{ matrix.release_id }}"
          echo "Kernel: ${{ matrix.kernel_release }}"
          echo "KSU changed: ${{ matrix.ksu_changed }}"
          echo "SUSFS changed: ${{ matrix.susfs_changed }}"

      - name: Validate local self-hosted workspace
        if: ${{ env.LOKUM_EXECUTOR == 'local' }}
        env:
          WORKSPACE_ROOT: ${{ vars.LOKUM_WORKSPACE }}
        run: |
          if [[ -z "${WORKSPACE_ROOT:-}" ]]; then
            echo "Repository variable LOKUM_WORKSPACE must point to the Android kernel workspace on the self-hosted runner." >&2
            exit 1
          fi
          if [[ ! -x "$WORKSPACE_ROOT/kernel_platform/tools/bazel" ]]; then
            echo "Kleaf Bazel wrapper not found under LOKUM_WORKSPACE: $WORKSPACE_ROOT" >&2
            exit 1
          fi
          if [[ ! -d "$WORKSPACE_ROOT/kernel_platform/common/.git" ]]; then
            echo "Kernel common repo not found under LOKUM_WORKSPACE: $WORKSPACE_ROOT" >&2
            exit 1
          fi

      - name: Build locally, verify, package, and optionally publish
        if: ${{ env.LOKUM_EXECUTOR == 'local' }}
        id: local_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MANIFEST: ${{ github.workspace }}/${{ matrix.manifest }}
          WORKSPACE_ROOT: ${{ vars.LOKUM_WORKSPACE }}
          SOURCE_BRANCH: ${{ matrix.source_branch }}
          FORCE_BUILD: "true"
          UPDATE_KSUNEXT: ${{ inputs.update_ksun }}
          UPDATE_SUSFS: ${{ inputs.update_susfs }}
          PUBLISH_RELEASE: ${{ inputs.publish_release }}
          RELEASE_SUFFIX: ${{ inputs.release_suffix || '' }}
        run: scripts/ci/auto-release.sh

      - name: Cleanup local runner state
        if: ${{ always() && env.LOKUM_EXECUTOR == 'local' }}
        env:
          MANIFEST: ${{ github.workspace }}/${{ matrix.manifest }}
          WORKSPACE_ROOT: ${{ vars.LOKUM_WORKSPACE }}
          AUTO_RELEASE_OUT_ROOT: ${{ steps.local_release.outputs.out_root }}
          AUTO_RELEASE_PACKAGE_OUT: ${{ steps.local_release.outputs.package_out }}
          CI_MANIFEST_PATH: ${{ steps.local_release.outputs.ci_manifest }}
          CLEAN_RELEASE_OUT: ${{ inputs.cleanup_after_run }}
          CLEAN_TEMP_MANIFESTS: "true"
          CLEAN_TOOL_CACHE: ${{ inputs.cleanup_caches }}
          CLEAN_BAZEL_OUTPUT: ${{ inputs.cleanup_caches }}
          RESET_REPOS: "true"
          PRUNE_CI_BRANCHES: "true"
          CLEAN_UNTRACKED_REPO_FILES: "true"
        run: scripts/ci/cleanup-runner-state.sh

      - name: Build inside Proxmox CT, verify, package, and optionally publish
        if: ${{ env.LOKUM_EXECUTOR == 'proxmox-ct' }}
        id: proxmox_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LOKUM_CI_SSH_PRIVATE_KEY: ${{ secrets.LOKUM_CI_SSH_PRIVATE_KEY }}
          LOKUM_GIT_TOKEN: ${{ secrets.LOKUM_GIT_TOKEN }}
          PROXMOX_SSH_TARGET: ${{ secrets.PROXMOX_SSH_TARGET || vars.PROXMOX_SSH_TARGET }}
          PROXMOX_SSH_PRIVATE_KEY: ${{ secrets.PROXMOX_SSH_PRIVATE_KEY }}
          PROXMOX_NODE: ${{ vars.PROXMOX_NODE || 'PROXMOX_NODE' }}
          PROXMOX_STORAGE: ${{ vars.PROXMOX_STORAGE || 'PROXMOX_STORAGE' }}
          PROXMOX_CT_TEMPLATE: ${{ vars.PROXMOX_CT_TEMPLATE }}
          PROXMOX_CT_BRIDGE: ${{ vars.PROXMOX_CT_BRIDGE || 'vmbr0' }}
          PROXMOX_CT_DISK_GB: ${{ vars.PROXMOX_CT_DISK_GB || '120' }}
          PROXMOX_CT_CORES: ${{ vars.PROXMOX_CT_CORES || '12' }}
          PROXMOX_CT_MEMORY_MB: ${{ vars.PROXMOX_CT_MEMORY_MB || '24576' }}
          PROXMOX_CT_SWAP_MB: ${{ vars.PROXMOX_CT_SWAP_MB || '4096' }}
          SYNC_JOBS: ${{ vars.LOKUM_REPO_SYNC_JOBS || '12' }}
          MANIFEST: ${{ github.workspace }}/${{ matrix.manifest }}
          SOURCE_BRANCH: ${{ matrix.source_branch }}
          FORCE_BUILD: "true"
          UPDATE_KSUNEXT: ${{ inputs.update_ksun }}
          UPDATE_SUSFS: ${{ inputs.update_susfs }}
          PUBLISH_RELEASE: ${{ inputs.publish_release }}
          RELEASE_SUFFIX: ${{ inputs.release_suffix || '' }}
        run: scripts/ci/proxmox-auto-release.sh

      - name: Summary
        if: always()
        env:
          RELEASE_ID: ${{ steps.proxmox_release.outputs.release_id || steps.local_release.outputs.release_id }}
          PACKAGE_OUT: ${{ steps.proxmox_release.outputs.package_out || steps.local_release.outputs.package_out }}
          ZIP_NAME: ${{ steps.proxmox_release.outputs.zip_name || steps.local_release.outputs.zip_name }}
          PUBLISHED: ${{ steps.proxmox_release.outputs.published || steps.local_release.outputs.published }}
        run: |
          {
            echo "## LokumKernel auto release"
            echo ""
            echo "Executor: $LOKUM_EXECUTOR"
            echo "Lane: ${{ matrix.release_id }}"
            echo "Release id: $RELEASE_ID"
            echo "Package dir: $PACKAGE_OUT"
            echo "Zip: $ZIP_NAME"
            echo "Published: $PUBLISHED"
            echo "Cleanup: Proxmox CT is destroyed by trap; local mode runs cleanup step"
          } >> "$GITHUB_STEP_SUMMARY"
